<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>App Settings</h1>
        <div class="settings-card">    
            <form method="POST" id="settings-form">
                <div class="settings-row">
                    <div class="form-group">
                        <label>Establishment Name</label>
                        <input type="text"
                            name="company_name"
                            value="{{ company_name }}">
                    </div>

                    <div class="form-group">
                        <label>Email Subject</label>
                        <input type="text"
                            name="mail_subject"
                            value="{{ subject }}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Body</label>

                    <p class="placeholder-note">Use {company_name}, {start_date}, {check_in}, {end_date}, {check_out} as placeholders.</p>

                    <div id="editor-container">
                        {{ body | safe }}
                    </div>

                    <input type="hidden" name="mail_body" id="mail_body">
                </div>

                <div class="settings-actions">
                    <button type="submit" class="btn primary">Save Changes</button>
                    <a href="{{ url_for('index') }}" class="settings-link back-link">Back to Home</a>
                </div>

            </form>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <script>
    var quill = new Quill('#editor-container', {
        theme: 'snow'
    });

    document.getElementById('settings-form').onsubmit = function () {
        document.getElementById('mail_body').value =
            quill.root.innerHTML;
    };
    </script>
</body>
</html>
